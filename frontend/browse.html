<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse — Vedic Astrology Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
    <div class="background-effects">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="container">
        <header class="hero hero-compact">
            <nav class="top-nav">
                <a href="index.html">← Search</a>
                &nbsp;·&nbsp;
                <a href="today.html">Today's Sky</a>
                &nbsp;·&nbsp;
                <a href="ask.html">Ask the Moment</a>
            </nav>
            <h1>Browse the Cosmos</h1>
            <p class="subtitle">Explore every house, planet, and zodiac sign</p>

            <div class="tabs" role="tablist" aria-label="Browse categories">
                <button class="tab active" data-tab="houses" role="tab" aria-selected="true">
                    <span class="tab-icon">🏠</span>
                    <span class="tab-label">Houses</span>
                    <span class="tab-count">12</span>
                </button>
                <button class="tab" data-tab="planets" role="tab" aria-selected="false">
                    <span class="tab-icon">🪐</span>
                    <span class="tab-label">Planets</span>
                    <span class="tab-count">9</span>
                </button>
                <button class="tab" data-tab="zodiac" role="tab" aria-selected="false">
                    <span class="tab-icon">♈</span>
                    <span class="tab-label">Zodiac</span>
                    <span class="tab-count">12</span>
                </button>
            </div>

            <div class="status-bar" id="status-bar">
                <span class="status-dot"></span>
                <span class="status-text">Viewing <strong id="status-count">12</strong> <span id="status-label">Houses (Bhavas)</span></span>
            </div>
        </header>

        <section id="loading">
            <div class="spinner"></div>
            <p>Loading...</p>
        </section>

        <section id="browse-container" class="results-grid"></section>
    </main>

    <script src="browse.js"></script>
</body>
</html>
