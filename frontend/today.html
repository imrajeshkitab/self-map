<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Today — Vedic Astrology Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=4">
    <link rel="stylesheet" href="today.css?v=3">
</head>
<body>
    <div class="background-effects">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="container">
        <header class="hero hero-compact">
            <nav class="top-nav">
                <a href="index.html">← Search</a>
                &nbsp;·&nbsp;
                <a href="browse.html">Browse</a>
                &nbsp;·&nbsp;
                <a href="ask.html">Ask the Moment</a>
            </nav>
            <h1>Today's Sky</h1>
            <p class="subtitle">A live Vedic snapshot — no birth data needed</p>
        </header>

        <!-- ============ Control bar ============ -->
        <section class="controls">
            <div class="ctrl-group">
                <label>📅 Date
                    <input type="date" id="ctrl-date">
                </label>
                <label>🕒 Time
                    <input type="time" id="ctrl-time" step="60">
                </label>
            </div>

            <div class="ctrl-group">
                <label>📍 Place
                    <select id="ctrl-place"></select>
                </label>
                <div id="ctrl-custom" class="hidden custom-coords">
                    <input type="number" id="ctrl-lat" step="0.0001" placeholder="Lat">
                    <input type="number" id="ctrl-lon" step="0.0001" placeholder="Lon">
                </div>
            </div>

            <div class="ctrl-group ctrl-buttons">
                <button id="ctrl-now" title="Set to current moment">⟳ Now</button>
                <button id="ctrl-geo" title="Use my browser location">📍 My location</button>
            </div>
        </section>

        <section id="loading">
            <div class="spinner"></div>
            <p>Reading the heavens…</p>
        </section>

        <section id="today-root" class="hidden">

            <div class="top-grid">
                <div class="lagna-strip" id="lagna-strip"></div>
                <div class="pulse-card" id="pulse-card"></div>
            </div>

            <div class="today-grid">
                <div class="chart-wrap">
                    <h2 class="section-heading">Prashna Chart</h2>
                    <p class="chart-caption">South Indian style · Whole-sign houses</p>
                    <div class="chart-sa" id="chart-sa"></div>
                    <div class="chart-legend">
                        <span><b>Lagna</b> = 1st house (gold-bordered cell).</span>
                        <span>Letters = planet abbreviations.</span>
                    </div>
                </div>

                <div class="weather-wrap">
                    <h2 class="section-heading">Cosmic Weather</h2>
                    <p class="chart-caption">Every planet's current state</p>
                    <div class="weather-list" id="weather-list"></div>
                </div>
            </div>

            <!-- ============ Dasha + Karakas ============ -->
            <div class="extra-grid">
                <div class="dasha-card" id="dasha-card"></div>
                <div class="karakas-card" id="karakas-card"></div>
            </div>

            <div class="chart-meta" id="chart-meta"></div>
        </section>
    </main>

    <script src="today.js?v=2"></script>
</body>
</html>
